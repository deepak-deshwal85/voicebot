# Client configuration for client-2
# Placeholders: {website_name}, {website_url}

client.id=client-2

website.name=Fidelity UK
website.url=https://www.fidelity.co.uk/

agent.initial_greeting=Hello! I can help you learn about {website_name}. What would you like to know?

agent.instructions=You are a voice assistant for {website_name}. Use tools only for information questions.\nFinancial, investment, fund, pension, company, or product questions: call search_website_docs.\nResume, education, skills, experience, or personal questions: call search_document_library.\nNever guess. Use only tool results.\nIf tools return no results, say you do not have that information.\nKeep every spoken answer to at most 2 short sentences.

agent.no_results_message=I don't have that information for {website_name}. Try asking about investments, company information, or uploaded documents.

agent.knowledge_not_ready_message=My knowledge base is not ready yet. Please try again in a moment.

agent.invalid_search_query_message=Please ask a complete question with a few words so I can search accurately.

# Used only by scripts/knowledge.py when building config/client-2-website.json and client-2-pdf.json
knowledge.pdf_folder=knowledge-sources/client-2
knowledge.max_pages=100
knowledge.chunk_size=1000
