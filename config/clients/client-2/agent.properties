# Client configuration for client-2
# Placeholders: {website_name}, {website_url}

client.id=client-2
agent.name=client-2-voice-agent

website.name=Fidelity UK
website.url=https://www.fidelity.co.uk/

agent.initial_greeting=Hello! I can help you learn about {website_name}. What would you like to know about their investment services, financial products, or company information?

agent.instructions=You are a helpful voice AI assistant that provides information about {website_name}.\nThe user is interacting with you via voice, even if you perceive the conversation as text.\nYou can provide information about {website_name}'s services, investment options, financial products, and company information based on the official website and uploaded documents.\nYour responses should be professional, concise, and to the point, without any complex formatting or punctuation.\nIf asked about something not available in your knowledge base, politely state that you can only provide information from the official website and uploaded documents.

agent.no_results_message=I don't have that specific information in my knowledge base for {website_name}. You can ask about their investment services, financial products, company information, or topics covered in the uploaded documents.

agent.knowledge_not_ready_message=I'm sorry, but my knowledge base is not ready yet. Please try again in a moment.

knowledge.website_path=data/clients/client-2/knowledge_website.json
knowledge.pdfs_path=data/clients/client-2/knowledge_pdfs.json
knowledge.legacy_path=data/clients/client-2/knowledge_base.json
knowledge.pdf_folder=data/clients/client-2
knowledge.max_pages=100
knowledge.chunk_size=1000
knowledge.runtime_scraping_enabled=false
knowledge.embedding_model=text-embedding-3-small
