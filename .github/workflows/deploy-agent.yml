name: Deploy Agent

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify livekit.toml is present
        run: |
          test -f livekit.toml
          grep -q 'id = ' livekit.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: UV_GIT_LFS=1 uv sync --dev

      - name: Validate tenant map
        env:
          PYTHONPATH: src
        run: |
          uv run python - <<'PY'
          from utils.config import list_client_ids, load_tenant_map

          mapping = load_tenant_map()
          assert mapping, "config/tenant-map.json is empty"
          for client_id in list_client_ids():
              assert client_id in mapping.values(), f"{client_id} missing from tenant-map.json"
          print(f"Tenant map OK: {mapping}")
          PY

      - name: Validate client knowledge stores
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          for client in client-1 client-2; do
            uv run python scripts/knowledge.py validate --client "$client"
          done

      - name: Download agent models
        env:
          AGENT_NAME: telephone-agent
        run: uv run python src/agent.py download-files

      - name: Install LiveKit CLI
        run: |
          curl -sSL https://get.livekit.io/cli | bash
          lk --version

      - name: Deploy to LiveKit Cloud
        env:
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          lk project add github-ci \
            --url "$LIVEKIT_URL" \
            --api-key "$LIVEKIT_API_KEY" \
            --api-secret "$LIVEKIT_API_SECRET" \
            --default || true

          lk agent deploy \
            --secrets "OPENAI_API_KEY=${OPENAI_API_KEY}" \
            --secrets "AGENT_NAME=telephone-agent" \
            --secrets "DEFAULT_CLIENT_ID=client-1" \
            --secrets "EMBEDDING_MODEL=text-embedding-3-small"
