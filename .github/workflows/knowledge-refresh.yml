name: Knowledge Refresh

on:
  workflow_dispatch:
    inputs:
      client:
        description: Client id
        required: true
        default: client-1
        type: choice
        options:
          - client-1
          - client-2
          - all
      source:
        description: Knowledge source to refresh
        required: true
        default: all
        type: choice
        options:
          - all
          - website
          - pdfs
      max_pages:
        description: Maximum website pages to crawl
        required: true
        default: "100"

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: UV_GIT_LFS=1 uv sync --dev

      - name: Refresh knowledge base
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMBEDDING_MODEL: text-embedding-3-small
        run: |
          if [ "${{ github.event.inputs.client }}" = "all" ]; then
            CLIENTS=(client-1 client-2)
          else
            CLIENTS=("${{ github.event.inputs.client }}")
          fi
          for client in "${CLIENTS[@]}"; do
            uv run python scripts/knowledge.py refresh "${{ github.event.inputs.source }}" \
              --client "$client" \
              --max-pages "${{ github.event.inputs.max_pages }}"
          done

      - name: Validate refreshed stores
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.client }}" = "all" ]; then
            CLIENTS=(client-1 client-2)
          else
            CLIENTS=("${{ github.event.inputs.client }}")
          fi
          for client in "${CLIENTS[@]}"; do
            uv run python scripts/knowledge.py validate --client "$client"
          done

      - name: Upload refreshed knowledge stores
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-stores-${{ github.event.inputs.client }}-${{ github.run_id }}
          path: |
            data/clients/**/knowledge_website.json
            data/clients/**/knowledge_pdfs.json
          if-no-files-found: warn
