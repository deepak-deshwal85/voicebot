name: Knowledge Refresh

on:
  workflow_dispatch:
    inputs:
      client:
        description: Client id
        required: true
        default: client-1
        type: choice
        options:
          - client-1
          - client-2
          - all

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: UV_GIT_LFS=1 uv sync --dev

      - name: Build knowledge base
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMBEDDING_MODEL: text-embedding-3-small
        run: |
          if [ "${{ github.event.inputs.client }}" = "all" ]; then
            CLIENTS=(client-1 client-2)
          else
            CLIENTS=("${{ github.event.inputs.client }}")
          fi
          for client in "${CLIENTS[@]}"; do
            uv run python scripts/knowledge.py build --client "$client"
          done

      - name: Validate knowledge base
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.client }}" = "all" ]; then
            CLIENTS=(client-1 client-2)
          else
            CLIENTS=("${{ github.event.inputs.client }}")
          fi
          for client in "${CLIENTS[@]}"; do
            uv run python scripts/knowledge.py validate --client "$client"
          done

      - name: Commit updated knowledge files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/*.json
          if git diff --staged --quiet; then
            echo "No knowledge file changes to commit."
          else
            git commit -m "chore: refresh knowledge base (${{ github.event.inputs.client }})"
            git push
          fi
